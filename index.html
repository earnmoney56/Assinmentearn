<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Support Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --wa-green: #075e54; --wa-light: #128c7e; --bg-color: #ece5dd; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            height: 100%; width: 100%;
            overflow: hidden;
        }
        
        .wa-header { 
            position: fixed; top: 0; left: 0; right: 0;
            background: var(--wa-green); color: white; 
            padding: 10px 15px; display: flex; align-items: center; gap: 12px; 
            font-size: 16px; height: 60px; z-index: 1000;
        }
        .wa-header .status-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; }
        .wa-header .sub-text { font-size: 11px; color: #b3d4d0; display: block; }
        
        .chat-container { 
            position: absolute; top: 60px; bottom: 75px; left: 0; right: 0;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-color: var(--bg-color); 
            overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px; 
        }
        
        .message { max-width: 75%; padding: 8px 14px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.08); word-break: break-word; }
        .message.sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .message.received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .message .time { font-size: 10px; color: #667781; text-align: right; margin-top: 4px; }
        
        .message img, .message video { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 5px; display: block; }
        .message audio { width: 100%; margin-top: 5px; }

        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #f0f2f5; 
            padding: 10px 12px 22px 12px; 
            display: flex; align-items: center; gap: 8px; 
            border-top: 1px solid #e9edef; height: 75px; z-index: 1000;
        }
        .input-wrapper {
            flex: 1; background: white; border-radius: 25px;
            display: flex; align-items: center; padding: 0 12px;
            border: 1px solid #ccc; height: 44px;
        }
        .input-box { 
            flex: 1; background: transparent; border: none; outline: none; 
            font-size: 16px; height: 100%; padding-left: 5px;
        }
        .clip-btn { color: #54656f; font-size: 20px; cursor: pointer; padding: 5px; }
        .send-btn { 
            background: var(--wa-light); color: white; 
            width: 44px; height: 44px; border-radius: 50%; 
            border: none; display: flex; justify-content: center; 
            align-items: center; font-size: 18px; cursor: pointer; flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="screen">
        <div class="wa-header">
            <i class="fas fa-user-circle" style="font-size: 32px;"></i>
            <div>
                <span style="font-weight: 600;">Support Team</span>
                <span class="sub-text"><span class="status-dot"></span> Active Online</span>
            </div>
        </div>
        
        <div class="chat-container" id="chat-box"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <label for="media-upload" class="clip-btn"><i class="fas fa-paperclip"></i></label>
                <input type="file" id="media-upload" style="display:none;" accept="image/*,video/*,audio/*">
                <input type="text" id="msg-input" class="input-box" placeholder="Type a message...">
            </div>
            <button id="btn-send" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nkwllaxgrmmlrqacbaro.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZTqBnJInrVgfpegOJfS6KQ_wwzYSQf0";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Ek unique ID user ke browser mein save karne ke liye taake pata chale message kisne bheja
        let myUserId = localStorage.getItem('user_chat_uuid');
        if (!myUserId) {
            myUserId = 'user-' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('user_chat_uuid', myUserId);
        }

        // Database se purane messages load karne ka function
        async function loadMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';

            try {
                let { data: items, error } = await supabase.from('messages').select('*').order('inserted_at', { ascending: true });
                if (items && !error) {
                    items.forEach(m => renderMsg(m));
                }
            } catch(e) { console.error(e); }
        }

        // Message ko screen par dikhane ka function
        function renderMsg(msg) {
            const box = document.getElementById('chat-box');
            if(!box || !msg.id || document.getElementById(`m-${msg.id}`)) return;

            const d = document.createElement('div');
            d.id = `m-${msg.id}`;
            
            // Agar sender ki ID meri ID se match karegi toh message right (green) par dikhega, warna left (white) par
            const isSentByMe = (msg.sender === myUserId);
            d.classList.add('message', isSentByMe ? 'sent' : 'received');

            const textContent = msg.message_text || '';
            const mediaUrl = msg.media_url || '';
            const msgType = msg.type || 'text';
            
            // Check image, video, audio or normal text
            if (msgType === 'image' && mediaUrl) {
                d.innerHTML = `<img src="${mediaUrl}">`;
            } else if (msgType === 'video' && mediaUrl) {
                d.innerHTML = `<video src="${mediaUrl}" controls></video>`;
            } else if (msgType === 'audio' && mediaUrl) {
                d.innerHTML = `<audio src="${mediaUrl}" controls></audio>`;
            } else {
                d.innerHTML = `<div>${textContent}</div>`;
            }

            // Timestamp formatting
            const t = document.createElement('div');
            t.classList.add('time');
            t.innerText = new Date(msg.inserted_at || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            d.appendChild(t);
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        // Message database mein send karne ka function
        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';

            try {
                const { data, error } = await supabase.from('messages').insert([{ 
                    message_text: val,
                    sender: myUserId,
                    type: 'text'
                }]).select();
                
                if (error) {
                    alert("Supabase Error: " + error.message);
                }
            } catch(e) { console.error(e); }
        }

        // Media files upload karne ka handling
        document.getElementById('media-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            let fileTypeMode = 'image';
            if (file.type.startsWith('video/')) fileTypeMode = 'video';
            if (file.type.startsWith('audio/')) fileTypeMode = 'audio';

            const uniquePath = `uploads/${Date.now()}_${file.name}`;
            try {
                let { error: uploadErr } = await supabase.storage.from('chat-media').upload(uniquePath, file);
                if (!uploadErr) {
                    const { data } = supabase.storage.from('chat-media').getPublicUrl(uniquePath);
                    await supabase.from('messages').insert([{ 
                        media_url: data.publicUrl,
                        sender: myUserId,
                        type: fileTypeMode
                    }]);
                } else {
                    alert("Storage Error: Please make sure a public storage bucket named 'chat-media' is created in Supabase.");
                }
            } catch(err) { console.error(err); }
        });

        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        // Realtime data sync listener
        window.addEventListener('DOMContentLoaded', () => {
            loadMessages();
            try {
                supabase.channel('global:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    renderMsg(payload.new);
                }).subscribe();
            } catch(e) { console.error(e); }
        });
    </script>
</body>
</html>
