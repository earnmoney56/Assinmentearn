<!DOCTYPE html>
<html lang="en">
<head> 
    <div id="debug-log" style="position:fixed; top:60px; left:0; right:0; background:rgba(0,0,0,0.8); color:#00ff00; font-family:monospace; font-size:11px; max-height:120px; overflow-y:auto; z-index:9999; padding:5px; pointer-events:none;">Console Logs Will Appear Here...</div>

<script>
    (function(){
        const logBox = document.getElementById('debug-log');
        function appendLog(type, args) {
            if(!logBox) return;
            const msg = Array.from(args).map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' ');
            logBox.innerHTML += `<br>[${type}] ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }
        console.log = function() { appendLog('LOG', arguments); };
        console.error = function() { appendLog('ERROR', arguments); };
        window.onerror = function(m, u, l) { appendLog('CRASH', [m, 'at line:', l]); };
    })();
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Support Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-green: #075e54; --wa-light: #128c7e; --bg-color: #ece5dd; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100%; width: 100%; overflow: hidden; }
        .wa-header { position: fixed; top: 0; left: 0; right: 0; background: var(--wa-green); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; font-size: 16px; height: 60px; z-index: 1000; }
        .wa-header .status-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; }
        .wa-header .status-dot.offline { background: #95a5a6; }
        .wa-header .sub-text { font-size: 11px; color: #b3d4d0; display: block; }
        .chat-container { position: absolute; top: 60px; bottom: 75px; left: 0; right: 0; background-color: var(--bg-color); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 8px 14px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.08); word-break: break-word; }
        .message.sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .message.received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .message .time { font-size: 10px; color: #667781; text-align: right; margin-top: 4px; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #f0f2f5; padding: 10px 12px 22px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #e9edef; height: 75px; z-index: 1000; }
        .input-wrapper { flex: 1; background: white; border-radius: 25px; display: flex; align-items: center; padding: 0 12px; border: 1px solid #ccc; height: 44px; gap: 8px; }
        .input-box { flex: 1; background: transparent; border: none; outline: none; font-size: 16px; height: 100%; }
        .send-btn { background: var(--wa-light); color: white; width: 44px; height: 44px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="screen">
        <div class="wa-header">
            <i class="fas fa-user-circle" style="font-size: 32px;"></i>
            <div>
                <span style="font-weight: 600;">Support Team (Admin)</span>
                <span class="sub-text" id="admin-status"><span class="status-dot offline"></span> Offline</span>
            </div>
        </div>
        <div class="chat-container" id="chat-box"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="msg-input" class="input-box" placeholder="Type a message...">
            </div>
            <button id="btn-send" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nkwllaxgrmmlrqacbaro.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZTqBnJInrVgfpegOJfS6KQ_wwzYSQf0";
        const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myUserId = localStorage.getItem('user_chat_uuid');
        if(!myUserId) {
            myUserId = 'User-' + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('user_chat_uuid', myUserId);
        }
        const currentRoomId = myUserId;

        async function loadMessages() {
            const box = document.getElementById('chat-box');
            let { data: items } = await dbClient.from('messages').select('*').eq('room_id', currentRoomId).order('inserted_at', { ascending: true });
            if (items) {
                box.innerHTML = '';
                items.forEach(m => renderMsg(m));
            }
        }

        function renderMsg(msg) {
            const box = document.getElementById('chat-box');
            if(!box || !msg.message_text) return;
            
            // Duplicate checks se bachne ke liye
            if (msg.id && document.getElementById(`m-${msg.id}`)) return;
            
            const d = document.createElement('div');
            if(msg.id) d.id = `m-${msg.id}`;
            d.classList.add('message', msg.sender === myUserId ? 'sent' : 'received');
            d.innerHTML = `<div>${msg.message_text}</div>`;
            
            const t = document.createElement('div');
            t.classList.add('time');
            t.innerText = new Date(msg.inserted_at || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            d.appendChild(t);
            
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';

            // Pehle local screen par dikha dein taake delay na lage
            renderMsg({ message_text: val, sender: myUserId, inserted_at: new Date() });

            await dbClient.from('messages').insert([{ 
                message_text: val, 
                sender: myUserId, 
                receiver: 'admin', 
                room_id: currentRoomId, 
                type: 'text'
            }]);
        }

        // Presence (Online/Offline Tracking)
        const trackChannel = dbClient.channel('presence-global', { config: { presence: { key: myUserId } } });
        
        trackChannel
        .on('presence', { event: 'sync' }, () => {
            const state = trackChannel.presenceState();
            if (state['admin']) {
                document.getElementById('admin-status').innerHTML = '<span class="status-dot"></span> Online';
            } else {
                document.getElementById('admin-status').innerHTML = '<span class="status-dot offline"></span> Offline';
            }
        })
        .on('presence', { event: 'leave' }, ({ key }) => {
            if (key === 'admin') {
                const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                document.getElementById('admin-status').innerHTML = `<span class="status-dot offline"></span> Last seen at ${now}`;
            }
        })
        .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await trackChannel.track({ online_at: new Date().toISOString() });
            }
        });

        // Realtime Messages Table updates
        dbClient.channel('custom-insert-channel')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            if(payload.new.room_id === currentRoomId) {
                renderMsg(payload.new);
            }
        })
        .subscribe();

        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
        window.addEventListener('DOMContentLoaded', loadMessages);
    </script>
</body>
</html>
