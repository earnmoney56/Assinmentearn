<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Support Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --wa-green: #075e54; --wa-light: #128c7e; --bg-color: #ece5dd; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            height: 100%; width: 100%;
            overflow: hidden;
        }
        
        /* Fixed Header */
        .wa-header { 
            position: fixed;
            top: 0; left: 0; right: 0;
            background: var(--wa-green); 
            color: white; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 16px; 
            height: 60px;
            z-index: 1000;
        }
        .wa-header .status-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; }
        .wa-header .sub-text { font-size: 11px; color: #b3d4d0; display: block; }
        
        /* Main Chat Scroll Box - Positioned safely between header and footer */
        .chat-container { 
            position: absolute;
            top: 60px;
            bottom: 70px; /* Safely ends before input area starts */
            left: 0; right: 0;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-color: var(--bg-color); 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        
        /* Messages Layout */
        .message { max-width: 75%; padding: 8px 14px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.08); word-break: break-word; }
        .message.sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .message.received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .message .time { font-size: 10px; color: #667781; text-align: right; margin-top: 4px; }
        
        /* ABSOLUTE FIXED INPUT BAR - Will never move outside the screen viewport */
        .input-area { 
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #f0f2f5; 
            padding: 10px 15px 20px 15px; /* Bottom padding lifts it clear of bottom controls */
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-top: 1px solid #e9edef; 
            height: 70px; 
            z-index: 1000;
        }
        .input-box { 
            flex: 1; 
            background: white; 
            border-radius: 25px; 
            padding: 0 15px; 
            border: 1px solid #ccc; 
            outline: none; 
            font-size: 16px; 
            height: 40px;
        }
        .send-btn { 
            background: var(--wa-light); 
            color: white; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            border: none; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 16px; 
            cursor: pointer; 
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="wa-header">
        <i class="fas fa-user-circle" style="font-size: 32px;"></i>
        <div>
            <span style="font-weight: 600;">Support Team</span>
            <span class="sub-text"><span class="status-dot"></span> Active Online</span>
        </div>
    </div>
    
    <div class="chat-container" id="chat-box">
        </div>

    <div class="input-area">
        <input type="text" id="msg-input" class="input-box" placeholder="Type a message...">
        <button id="btn-send" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        // Supabase Endpoint Keys
        const SUPABASE_URL = "https://nkwllaxgrmmlrqacbaro.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZTqBnJInrVgfpegOJfS6KQ_wwzYSQf0";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Tracker Local Cache Key
        let myUserUUID = localStorage.getItem('user_chat_uuid');
        if (!myUserUUID) {
            myUserUUID = 'user-' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('user_chat_uuid', myUserUUID);
        }

        async function loadMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            
            // Add Initial Static Bot Greeting
            const greet = document.createElement('div');
            greet.classList.add('message', 'received');
            greet.innerHTML = `<div>Welcome! How can we assist you today? Feel free to drop a message here.</div><div class="time">Just now</div>`;
            box.appendChild(greet);

            try {
                let { data: items, error } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
                if (items && !error) {
                    items.forEach(m => {
                        if(m.user_id === myUserUUID || m.email === 'admin') {
                            renderMsg(m);
                        }
                    });
                }
            } catch(e) { console.log(e); }
        }

        function renderMsg(msg) {
            const box = document.getElementById('chat-box');
            if(!box || document.getElementById(`m-${msg.id}`)) return;

            const d = document.createElement('div');
            d.id = `m-${msg.id}`;
            d.classList.add('message', msg.email === 'admin' ? 'received' : 'sent');
            d.innerHTML = `<div>${msg.message}</div>`;

            const t = document.createElement('div');
            t.classList.add('time');
            t.innerText = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            d.appendChild(t);
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';

            const tempId = Date.now();
            renderMsg({ id: tempId, message: val, email: 'client', created_at: new Date().toISOString() });

            try {
                await supabase.from('messages').insert([{ user_id: myUserUUID, email: 'client', message: val }]);
            } catch(e) { console.log(e); }
        }

        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadMessages();
            try {
                supabase.channel('global:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    if(payload.new.user_id === myUserUUID || payload.new.email === 'admin') {
                        renderMsg(payload.new);
                    }
                }).subscribe();
            } catch(e) { console.log(e); }
        });
    </script>
</body>
</html>
