<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnMoney - Reward Collector</title>
    <!-- Supabase CDN JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #f39c12;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --dark: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
        }
        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h2 { color: var(--dark); margin-top: 0; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .hidden { display: none !important; }
        /* Chat Interface Styles */
        .chat-box {
            height: 300px;
            border: 1px solid #eee;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            background: #fafafa;
            border-radius: 8px;
        }
        .msg { margin: 5px 0; padding: 8px; border-radius: 6px; }
        .msg.sent { background: #e1ffc7; text-align: right; }
        .msg.received { background: #fff; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. Auth Section -->
        <div id="auth-section" class="card">
            <h2>Login / Sign Up</h2>
            <input type="email" id="email" placeholder="Enter Email">
            <input type="password" id="password" placeholder="Enter Password">
            <button onclick="handleLogin()">Login</button>
            <button onclick="handleSignUp()" style="background:#2ecc71;">Sign Up</button>
        </div>

        <!-- 2. Main Dashboard & Reward Collector -->
        <div id="dashboard-section" class="card hidden">
            <h2>Welcome to Reward Collector</h2>
            <div style="font-size: 24px; margin: 15px 0;">Balance: <strong id="balance-display">0</strong> Points</div>
            <button onclick="collectDailyReward()" style="background:#3498db;">Collect Daily Reward (+100)</button>
            <button onclick="logout()" style="background:#e74c3c; margin-top: 20px;">Logout</button>
        </div>

        <!-- 3. Real-time Customer Chat Support Section -->
        <div id="chat-section" class="card hidden">
            <h3>Live Chat Support</h3>
            <div id="chat-messages" class="chat-box"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button onclick="sendMessage()" style="width: 80px;">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Aapke Supabase Credentials auto-injected yahan hain
        const SUPABASE_URL = "https://nkwllaxgrmmlrqacbaro.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZTqBnJInrVgfpegOJfS6KQ_wwzYSQf0";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Auth State Change Monitor
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                document.getElementById('chat-section').classList.remove('hidden');
                loadUserData(session.user.id);
                listenToChat();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
                document.getElementById('chat-section').classList.add('hidden');
            }
        });

        // Sign Up Function
        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Sign up successful! Please check your email or login.");
        }

        // Login Function
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        }

        // Logout
        async function logout() {
            await supabase.auth.signOut();
        }

        // Load Balance/User Data from Supabase Profiles Table
        async function loadUserData(userId) {
            let { data, error } = await supabase.from('profiles').select('balance').eq('id', userId).single();
            if (error && error.code === 'PGRST116') {
                // Agar profile nahi bani hui toh nai create karein
                await supabase.from('profiles').insert([{ id: userId, balance: 0 }]);
                document.getElementById('balance-display').innerText = "0";
            } else if (data) {
                document.getElementById('balance-display').innerText = data.balance;
            }
        }

        // Collect Reward Logic
        async function collectDailyReward() {
            const user = (await supabase.auth.getUser()).data.user;
            if (!user) return;
            
            let currentBalance = parseInt(document.getElementById('balance-display').innerText);
            let newBalance = currentBalance + 100;

            const { error } = await supabase.from('profiles').update({ balance: newBalance }).eq('id', user.id);
            if (!error) {
                document.getElementById('balance-display').innerText = newBalance;
                alert("100 Points Added Successfully!");
            } else {
                alert("Error saving reward: " + error.message);
            }
        }

        // Real-time Chat Messaging Logic
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const messageText = input.value.trim();
            const user = (await supabase.auth.getUser()).data.user;
            if (!messageText || !user) return;

            const { error } = await supabase.from('messages').insert([
                { user_id: user.id, message: messageText, email: user.email }
            ]);
            if (!error) input.value = '';
        }

        // Real-time listener for incoming chat messages
        function listenToChat() {
            supabase.channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                displayMessage(payload.new);
            })
            .subscribe();

            // Fetch existing messages on load
            fetchMessages();
        }

        async function fetchMessages() {
            let { data: messages } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (messages) {
                document.getElementById('chat-messages').innerHTML = '';
                messages.forEach(msg => displayMessage(msg));
            }
        }

        async function displayMessage(msg) {
            const chatBox = document.getElementById('chat-messages');
            const user = (await supabase.auth.getUser()).data.user;
            const div = document.createElement('div');
            div.classList.add('msg');
            div.classList.add(msg.user_id === user.id ? 'sent' : 'received');
            div.innerText = `${msg.email.split('@')[0]}: ${msg.message}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
