<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jh Seller - WhatsApp Chat Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col md:flex-row">

    <div class="w-full md:w-1/3 bg-white border-r border-gray-200 flex flex-col h-1/3 md:h-full">
        <div class="p-4 bg-green-600 text-white font-bold text-lg flex items-center justify-between">
            <span>Jh Seller Chats</span>
            <span class="text-xs bg-green-800 px-2 py-1 rounded">Live</span>
        </div>
        <div id="chat-list" class="overflow-y-auto flex-1 divide-y divide-gray-100">
            <p class="p-4 text-gray-500 text-center text-sm">Waiting for incoming messages...</p>
        </div>
    </div>

    <div class="w-full md:w-2/3 flex flex-col h-2/3 md:h-full bg-[url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')] bg-repeat">
        <div class="p-4 bg-gray-200 border-b border-gray-300 font-semibold text-gray-700" id="active-chat-header">
            Select a customer to view conversation
        </div>

        <div id="messages-container" class="flex-1 p-4 overflow-y-auto flex flex-col space-y-2">
            </div>

        <div class="p-4 bg-gray-100 border-t border-gray-300 flex flex-col space-y-2">
            <div class="flex items-center space-x-2">
                <input type="text" id="msg-input" placeholder="Type your text message here..." class="flex-1 p-2 border rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-green-500">
                <button onclick="sendText()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-green-700">Send</button>
            </div>

            <div class="flex flex-wrap gap-2 pt-1 border-t border-gray-200 justify-start items-center">
                <span class="text-xs font-bold text-gray-500 uppercase mr-2">Send Media via WhatsApp:</span>
                <button onclick="sendMedia('image')" class="bg-blue-500 text-white text-xs px-3 py-1.5 rounded hover:bg-blue-600">🖼️ Image URL</button>
                <button onclick="sendMedia('video')" class="bg-purple-500 text-white text-xs px-3 py-1.5 rounded hover:bg-purple-600">🎥 Video URL</button>
                <button onclick="sendMedia('audio')" class="bg-yellow-600 text-white text-xs px-3 py-1.5 rounded hover:bg-yellow-700">🎙️ Voice/Audio URL</button>
            </div>
        </div>
    </div>

    <script>
        // Your Firebase Configuration from 'new-website-6d291'
        const firebaseConfig = {
            projectId: "new-website-6d291",
            authDomain: "new-website-6d291.firebaseapp.com",
            storageBucket: "new-website-6d291.appspot.com"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentActiveCustomer = null;

        // 1. Listen to 'chats' collection in real-time from Firestore
        db.collection("chats").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const chatListDiv = document.getElementById("chat-list");
            chatListDiv.innerHTML = "";

            if(snapshot.empty) {
                chatListDiv.innerHTML = `<p class="p-4 text-gray-500 text-center text-sm">No active chats found.</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const customerId = doc.id; // Phone number
                
                const chatItem = document.createElement("div");
                chatItem.className = `p-4 cursor-pointer hover:bg-gray-50 transition flex flex-col ${currentActiveCustomer === customerId ? 'bg-green-50' : ''}`;
                chatItem.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-800">+${customerId}</span>
                        <span class="text-xs text-gray-400">${data.timestamp ? new Date(data.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                    </div>
                    <p class="text-sm text-gray-500 truncate mt-1">${data.lastMessage || 'Media message'}</p>
                `;
                
                chatItem.onclick = () => selectCustomer(customerId, data);
                chatListDiv.appendChild(chatItem);
            });
        });

        // 2. Select a customer to chat
        function selectCustomer(phone, data) {
            currentActiveCustomer = phone;
            document.getElementById("active-chat-header").innerText = `Chatting with: +${phone}`;
            
            const container = document.getElementById("messages-container");
            container.innerHTML = ""; // Clear old views

            // Add the last incoming message captured by Pipedream as a bubble
            if (data.lastMessage) {
                const msgBubble = document.createElement("div");
                msgBubble.className = "bg-white text-gray-800 p-3 rounded-lg max-w-xs shadow self-start rounded-tl-none";
                msgBubble.innerHTML = `
                    <p class="text-sm">${data.lastMessage}</p>
                    <span class="text-[10px] text-gray-400 block text-right mt-1">Customer</span>
                `;
                container.appendChild(msgBubble);
            }
            container.scrollTop = container.scrollHeight;
        }

        // 3. Action: Send Text Message via WhatsApp API link
        function sendText() {
            const textInput = document.getElementById("msg-input");
            const text = textInput.value.trim();

            if (!currentActiveCustomer) {
                alert("Please select a customer from the left sidebar first!");
                return;
            }
            if (!text) return;

            // Direct WhatsApp Send URL Setup for business communication redirection
            const waUrl = `https://wa.me/${currentActiveCustomer}?text=${encodeURIComponent(text)}`;
            window.open(waUrl, '_blank');
            
            // Append locally to chat box for visual history tracking
            appendLocalMessage(text, "text");
            textInput.value = "";
        }

        // 4. Action: Send Media (Image, Video, Audio)
        function sendMedia(type) {
            if (!currentActiveCustomer) {
                alert("Please select a customer from the left sidebar first!");
                return;
            }

            const mediaUrl = prompt(`Enter the direct public URL of your ${type}:`);
            if (!mediaUrl) return;

            // Open target WhatsApp layout with standard tracking text
            const textPayload = `Here is the shared ${type}: ${mediaUrl}`;
            const waUrl = `https://wa.me/${currentActiveCustomer}?text=${encodeURIComponent(textPayload)}`;
            window.open(waUrl, '_blank');

            appendLocalMessage(mediaUrl, type);
        }

        // Helper to instantly add outgoing bubble to screen
        function appendLocalMessage(content, type) {
            const container = document.getElementById("messages-container");
            const bubble = document.createElement("div");
            bubble.className = "bg-green-500 text-white p-3 rounded-lg max-w-xs shadow self-end rounded-tr-none";
            
            if (type === 'image') {
                bubble.innerHTML = `<img src="${content}" class="max-w-xs rounded mb-1" alt="Image File"><span class="text-[10px] text-green-100 block text-right">Sent</span>`;
            } else if (type === 'video') {
                bubble.innerHTML = `<video src="${content}" controls class="max-w-xs rounded mb-1"></video><span class="text-[10px] text-green-100 block text-right">Sent</span>`;
            } else if (type === 'audio') {
                bubble.innerHTML = `<audio src="${content}" controls class="max-w-full scale-90"></audio><span class="text-[10px] text-green-100 block text-right">Sent</span>`;
            } else {
                bubble.innerHTML = `<p class="text-sm">${content}</p><span class="text-[10px] text-green-100 block text-right">Sent</span>`;
            }
            
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
