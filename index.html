<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Support Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { font-family: Arial, sans-serif; background: #ece5dd; height: 100%; width: 100%; overflow: hidden; }
        
        .header { background: #075e54; color: white; padding: 15px; font-weight: bold; font-size: 18px; text-align: center; position: fixed; top: 0; left: 0; right: 0; height: 55px; z-index: 10; }
        
        .chat-box { position: absolute; top: 55px; bottom: 65px; left: 0; right: 0; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 8px; font-size: 16px; word-break: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.sent { background: #d9fdd3; align-self: flex-end; }
        .msg.received { background: white; align-self: flex-start; }
        
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #f0f2f5; padding: 10px; display: flex; gap: 8px; height: 65px; border-top: 1px solid #ddd; z-index: 10; }
        .input-box { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; font-size: 16px; outline: none; background: white; }
        .send-btn { background: #128c7e; color: white; border: none; padding: 0 20px; border-radius: 20px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">Support Team Chat</div>
    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="msg-input" class="input-box" placeholder="Type a message...">
        <button id="btn-send" class="send-btn">Send</button>
    </div>

    <script>
        const SUPABASE_URL = "https://nkwllaxgrmmlrqacbaro.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZTqBnJInrVgfpegOJfS6KQ_wwzYSQf0";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Client Identity Session
        let myUserId = localStorage.getItem('user_chat_uuid');
        if (!myUserId) {
            myUserId = 'user-' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('user_chat_uuid', myUserId);
        }

        // Load Messages from Supabase
        async function fetchMessages() {
            const box = document.getElementById('chat-box');
            try {
                let { data: records, error } = await supabase.from('messages').select('*').order('inserted_at', { ascending: true });
                if (!error && records) {
                    box.innerHTML = '';
                    records.forEach(m => {
                        if (m.message_text) {
                            const d = document.createElement('div');
                            d.classList.add('msg');
                            d.classList.add(m.sender === myUserId ? 'sent' : 'received');
                            d.innerText = m.message_text;
                            box.appendChild(d);
                        }
                    });
                    box.scrollTop = box.scrollHeight;
                }
            } catch (err) { console.error(err); }
        }

        // Send Message to Supabase
        async function pushMessage() {
            const inp = document.getElementById('msg-input');
            const txt = inp.value.trim();
            if (!txt) return;
            inp.value = '';

            try {
                const { error } = await supabase.from('messages').insert([
                    { message_text: txt, sender: myUserId, type: 'text' }
                ]);
                if (error) {
                    alert("Supabase Error: " + error.message);
                }
            } catch (e) { alert("App Error: " + e.message); }
        }

        document.getElementById('btn-send').addEventListener('click', pushMessage);
        document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') pushMessage(); });

        // Auto Refresh & Sync
        window.addEventListener('DOMContentLoaded', () => {
            fetchMessages();
            // Listen for new entries live
            supabase.channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                fetchMessages();
            }).subscribe();
        });
    </script>
</body>
</html>
