<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { 
            background: #dadbd3; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            display: flex; justify-content: center; align-items: center; height: 100vh; 
        }
        .chat-container { width: 100%; max-width: 450px; height: 100vh; background: #efeae2; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.15); overflow: hidden; }
        
        .chat-header { background: #075e54; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; background: #ccc; }
        .header-info { flex: 1; }
        .header-info .name { font-size: 16px; font-weight: 600; }
        .header-info .status { font-size: 12px; color: #dcf8c6; }
        
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #efeae2; }
        
        /* Message Bubbles */
        .msg { 
            max-width: 80%; 
            padding: 6px 7px 6px 9px; 
            border-radius: 8px; 
            font-size: 14.5px; 
            line-height: 1.4; 
            word-wrap: break-word; 
            position: relative; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.13); 
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 15px;
        }
        .msg.sent-by-me { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; color: #111b21; }
        .msg.received-by-me { background: #ffffff; align-self: flex-start; border-top-left-radius: 0; color: #111b21; }
        
        .msg-meta { 
            margin-left: auto;
            display: inline-flex; 
            align-items: center; 
            gap: 3px; 
            font-size: 10px; 
            color: #667781; 
            padding-top: 4px;
        }
        
        .tick { display: inline-block; font-weight: bold; font-size: 12px; margin-left: 1px; }
        .tick.sent { color: #8696a0; }
        .tick.delivered { color: #8696a0; }
        .tick.read { color: #53bdeb; }

        .chat-input-area { padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 8px; }
        .input-container { flex: 1; background: #fff; border-radius: 24px; display: flex; align-items: center; padding: 2px 12px; }
        .input-container input[type="text"] { flex: 1; border: none; outline: none; padding: 10px 4px; font-size: 15px; background: transparent; }
        .send-btn { background: #005c4b; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDe8rFsoeI7QnlPfuJb_FyWOLe1SdqEZHM",
            authDomain: "wattsapp-27aa4.firebaseapp.com",
            databaseURL: "https://wattsapp-27aa4-default-rtdb.firebaseio.com",
            projectId: "wattsapp-27aa4",
            storageBucket: "wattsapp-27aa4.firebasestorage.app",
            messagingSenderId: "826330591993",
            appId: "1:826330591993:web:51865cddf32ba8b5312828",
            measurementId: "G-WY2ND6EVZC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        // 🆔 UNIQUE USER ID GENERATOR & PERSISTENCE
        // Yeh logic check karega ke kya user ke browser mein pehle se unique ID save hai, nahi toh nayi auto-generate karega
        let myUserId = localStorage.getItem('my_chat_session_id');
        if (!myUserId) {
            // Generate standard unique key
            myUserId = 'User_' + Math.random().toString(36).substring(2, 9).toUpperCase();
            localStorage.setItem('my_chat_session_id', myUserId);
        }

        // Connect to individual user document inside group_messages
        const myChatDocRef = doc(db, "group_messages", myUserId);

        // 1. Listen to this specific user's chat only
        function listenToMyChat() {
            const q = query(collection(db, "group_messages", myUserId, "messages"), orderBy("time_now", "asc"));
            onSnapshot(q, (snapshot) => {
                chatBox.innerHTML = "";
                snapshot.forEach((snapshotDoc) => {
                    const data = snapshotDoc.data();
                    const isMe = data.sender === 'user';
                    renderMessage(isMe, data.type || 'text', data.message_text || data.file_url || data.content, data.time_label, data.status);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // Render message on screen
        function renderMessage(isMe, type, content, timeStr, status) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', isMe ? 'sent-by-me' : 'received-by-me');

            if (type === 'text') {
                msgDiv.innerText = content;
            } else {
                msgDiv.innerHTML = `<p>${content}</p>`;
            }

            let ticksHtml = '';
            if (isMe) {
                if (status === 'sent') ticksHtml = '<span class="tick sent">✓</span>';
                else if (status === 'delivered') ticksHtml = '<span class="tick delivered">✓✓</span>';
                else if (status === 'read') ticksHtml = '<span class="tick read">✓✓</span>';
                else ticksHtml = '<span class="tick sent">✓</span>';
            }

            const metaDiv = document.createElement('div');
            metaDiv.classList.add('msg-meta');
            metaDiv.innerHTML = `<span>${timeStr || ''}</span> ${ticksHtml}`;
            msgDiv.appendChild(metaDiv);

            chatBox.appendChild(msgDiv);
        }

        function getFormattedTime() {
            const now = new Date();
            let hours = now.getHours(); let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12; hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0'+minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        // 2. Send Message under unique user ID
        async function sendMessage(text) {
            const timestamp = Date.now();
            
            // First make sure the main document exists in group_messages
            await setDoc(myChatDocRef, { active: true }, { merge: true });

            const messageData = {
                sender: 'user',
                type: 'text',
                message_text: text,
                time_now: timestamp,
                time_label: getFormattedTime(),
                status: "sent"
            };

            await addDoc(collection(db, "group_messages", myUserId, "messages"), messageData);
        }

        sendBtn.addEventListener('click', () => { 
            const t = msgInput.value.trim(); 
            if(t){ msgInput.value = ""; sendMessage(t); } 
        });
        msgInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') { 
                const t = msgInput.value.trim(); 
                if(t){ msgInput.value = ""; sendMessage(t); } 
            } 
        });

        // Initialize user chat listener
        listenToMyChat();
    </script>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <img class="profile-img" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Profile">
        <div class="header-info">
            <div class="name">Customer Support</div>
            <div class="status">Online</div>
        </div>
    </div>
    <div class="chat-messages" id="chatBox"></div>
    <div class="chat-input-area">
        <div class="input-container">
            <input type="text" id="msgInput" placeholder="Type a message...">
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>
</body>
</html>
