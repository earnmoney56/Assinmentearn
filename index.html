<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Support Chat</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-green: #075e54; --wa-light: #128c7e; --bg-color: #ece5dd; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100%; width: 100%; overflow: hidden; }
        .wa-header { position: fixed; top: 0; left: 0; right: 0; background: var(--wa-green); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; font-size: 16px; height: 60px; z-index: 1000; }
        .wa-header .status-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; }
        .chat-container { position: absolute; top: 60px; bottom: 75px; left: 0; right: 0; background-color: var(--bg-color); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 8px 14px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.08); word-break: break-word; }
        .message.sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .message.received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #f0f2f5; padding: 10px 12px 22px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #e9edef; height: 75px; z-index: 1000; }
        .input-wrapper { flex: 1; background: white; border-radius: 25px; display: flex; align-items: center; padding: 0 12px; border: 1px solid #ccc; height: 44px; }
        .input-box { flex: 1; background: transparent; border: none; outline: none; font-size: 16px; height: 100%; }
        .send-btn { background: var(--wa-light); color: white; width: 44px; height: 44px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wa-header">
        <i class="fas fa-user-circle" style="font-size: 32px;"></i>
        <div>
            <span style="font-weight: 600;">Support Team (Admin)</span>
            <span style="font-size: 11px; color: #b3d4d0; display: block;"><span class="status-dot"></span> Firebase Live</span>
        </div>
    </div>
    <div class="chat-container" id="chat-box"></div>
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="msg-input" class="input-box" placeholder="Type a message...">
        </div>
        <button id="btn-send" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDe8zFsomI7Qn1PfuJb_FyWOLe1SdqEZHM",
            authDomain: "wattsapp-27aa4.firebaseapp.com",
            projectId: "wattsapp-27aa4",
            storageBucket: "wattsapp-27aa4.appspot.com",
            messagingSenderId: "826330591993",
            appId: "1:826330591993:web:51865cddf32ba8b5312028"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let myUserId = localStorage.getItem('user_chat_uuid') || 'User-' + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('user_chat_uuid', myUserId);

        db.collection("messages")
          .where("room_id", "==", myUserId)
          .orderBy("timestamp", "asc")
          .onSnapshot((snapshot) => {
              const box = document.getElementById('chat-box');
              box.innerHTML = '';
              snapshot.forEach((doc) => {
                  const m = doc.data();
                  const d = document.createElement('div');
                  d.classList.add('message', m.sender === myUserId ? 'sent' : 'received');
                  d.innerHTML = `<div>${m.message_text}</div>`;
                  box.appendChild(d);
              });
              box.scrollTop = box.scrollHeight;
          });

        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';

            await db.collection("messages").add({
                message_text: val,
                sender: myUserId,
                receiver: 'admin',
                room_id: myUserId,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
