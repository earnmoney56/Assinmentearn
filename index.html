<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top right, rgba(230,253,245,0.7) 0%, rgba(245,243,255,0.7) 100%), #f8fafc; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 480px; padding: 18px 18px 100px 18px; }
        .main-balance-wrapper { margin: 20px 0 15px 5px; }
        .main-balance-text { font-size: 2.5rem; font-weight: 800; color: #1e293b; letter-spacing: -1px; }
        .main-balance-text span { color: #2563eb; font-weight: 800; margin-right: 5px; }
        .glass-card-section { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(20px); border-radius: 28px; padding: 16px; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); margin-bottom: 22px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: rgba(255, 255, 255, 0.9); padding: 16px 14px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.8); }
        .stat-card .label { font-size: 0.68rem; color: #64748b; font-weight: 800; margin-bottom: 6px; }
        .stat-card .value { font-size: 1.25rem; font-weight: 700; color: #0f172a; }
        .actions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 22px; }
        .action-card { border-radius: 24px; padding: 22px 10px; text-align: center; color: white; cursor: pointer; text-decoration: none; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06); transition: transform 0.2s ease; display: block; }
        .action-card:active { transform: scale(0.96); }
        .action-card i { font-size: 1.6rem; margin-bottom: 12px; display: block; }
        .action-card span { font-size: 0.75rem; font-weight: 800; }
        .bg-deposit { background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%); }
        .bg-withdraw { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .bg-task { background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%); }
        .bottom-nav-bar { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; background: rgba(255, 255, 255, 0.95); border-radius: 35px; display: flex; justify-content: space-between; align-items: center; padding: 10px 24px; box-shadow: 0 12px 35px rgba(15, 23, 42, 0.08); border: 1px solid rgba(255, 255, 255, 0.8); }
        .nav-link { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.65rem; font-weight: 700; text-decoration: none; }
        .nav-link i { font-size: 1.3rem; margin-bottom: 3px; }
        .nav-link.active { color: #2563eb; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-balance-wrapper">
            <h1 class="main-balance-text"><span>Rs</span><span id="rs-balance">0.00</span></h1>
        </div>
        <div class="glass-card-section">
            <div class="stats-grid">
                <div class="stat-card"><p class="label">ACCOUNT BALANCE</p><p class="value" id="acc-balance">0.00</p></div>
                <div class="stat-card"><p class="label">ACTIVE PLANS</p><p class="value" id="active-plans">0</p></div>
                <div class="stat-card"><p class="label">TOTAL WITHDRAW</p><p class="value" id="total-withdraw">0.00</p></div>
                <div class="stat-card"><p class="label">TOTAL DEPOSIT</p><p class="value" id="total-deposit">0.00</p></div>
            </div>
        </div>
        <div class="actions-grid">
            <div class="action-card bg-deposit"><i class="fa-solid fa-wallet"></i><span>DEPOSIT</span></div>
            <a href="withdraw.html" class="action-card bg-withdraw"><i class="fa-solid fa-money-bill-transfer"></i><span>WITHDRAW</span></a>
            <a href="tasks.html" class="action-card bg-task"><i class="fa-solid fa-circle-play"></i><span>TASK VIDEO</span></a>
        </div>
        <div class="bottom-nav-bar">
            <a href="index.html" class="nav-link active"><i class="fa-solid fa-house"></i><span>HOME</span></a>
            <a href="tasks.html" class="nav-link"><i class="fa-solid fa-bolt"></i><span>TASKS</span></a>
            <a href="withdraw.html" class="nav-link"><i class="fa-solid fa-circle-user"></i><span>WITHDRAW</span></a>
        </div>
    </div>
    <script>
        const supabase = supabase.createClient('https://kfbvwxafwbptdllonbwm.supabase.co', 'Sb_publishable_EFOjhEF20LOuN_rr3MTAzQ_CkWhQVU8');
        const USER_ID = "22deb1ca-dfc3-4794-978c-2b64d8424f1e";
        async function loadData() {
            const { data } = await supabase.from('profiles').select('*').eq('id', USER_ID).single();
            if (data) {
                document.getElementById('rs-balance').innerText = parseFloat(data.balance || 0).toFixed(2);
                document.getElementById('acc-balance').innerText = parseFloat(data.balance || 0).toFixed(2);
                document.getElementById('active-plans').innerText = data.active_plans || 0;
                document.getElementById('total-withdraw').innerText = parseFloat(data.total_withdraw || 0).toFixed(2);
                document.getElementById('total-deposit').innerText = parseFloat(data.total_deposit || 0).toFixed(2);
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
