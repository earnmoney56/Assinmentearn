<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp CRM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, query, orderBy, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ✅ Aapka Real Firebase Config Code
        const firebaseConfig = {
          apiKey: "AIzaSyDLjMjHspr_Iovoo3vLaDyWU35KqafN9a8",
          authDomain: "new-website-6d291.firebaseapp.com",
          projectId: "new-website-6d291",
          storageBucket: "new-website-6d291.firebasestorage.app",
          messagingSenderId: "32392835026",
          appId: "1:32392835026:web:2f1aa823ccd46fcb2a220b",
          measurementId: "G-LZFEQN2NX2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeChatNumber = null;

        // Load Chat List Realtime
        const chatsQuery = query(collection(db, "chats"), orderBy("lastMessageTime", "desc"));
        onSnapshot(chatsQuery, (snapshot) => {
            const chatListHtml = document.getElementById('chat-list');
            chatListHtml.innerHTML = '';
            snapshot.forEach((doc) => {
                const chat = doc.data();
                const activeClass = activeChatNumber === doc.id ? 'bg-green-100' : 'hover:bg-gray-100';
                chatListHtml.innerHTML += `
                    <div onclick="openChat('${doc.id}')" class="p-4 border-b cursor-pointer transition ${activeClass}">
                        <p class="font-bold text-gray-800">+${doc.id}</p>
                        <p class="text-sm text-gray-500 truncate">${chat.lastMessage || ''}</p>
                    </div>
                `;
            });
        });

        // Open Specific Chat
        window.openChat = function(phoneNumber) {
            activeChatNumber = phoneNumber;
            document.getElementById('chat-title').innerText = `Chat: +${phoneNumber}`;
            document.getElementById('chat-box-placeholder').classList.add('hidden');
            document.getElementById('active-chat-area').classList.remove('hidden');

            const messagesQuery = query(collection(db, `chats/${phoneNumber}/messages`), orderBy("timestamp", "asc"));
            onSnapshot(messagesQuery, (snapshot) => {
                const messageWindow = document.getElementById('message-window');
                messageWindow.innerHTML = '';
                snapshot.forEach((msgDoc) => {
                    const msg = msgDoc.data();
                    const isMe = msg.sender === 'admin';
                    const msgClass = isMe ? 'bg-green-500 text-white ml-auto' : 'bg-gray-200 text-gray-800';
                    messageWindow.innerHTML += `
                        <div class="max-w-xs md:max-w-md p-3 rounded-lg my-2 text-sm ${msgClass}">
                            ${msg.text}
                        </div>
                    `;
                });
                messageWindow.scrollTop = messageWindow.scrollHeight;
            });
        }

        // Send Reply via Meta Cloud API
        window.sendMessage = async function() {
            const inputField = document.getElementById('message-input');
            const text = inputField.value.trim();
            if(!text || !activeChatNumber) return;

            inputField.value = '';

            // 1. Save to Local Firebase Database
            await addDoc(collection(db, `chats/${activeChatNumber}/messages`), {
                text: text,
                sender: 'admin',
                timestamp: serverTimestamp()
            });

            // 2. Trigger Meta WhatsApp API to Send to Customer Mobile
            try {
                await fetch(`https://graph.facebook.com/v20.0/YOUR_META_PHONE_NUMBER_ID/messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer YOUR_META_ACCESS_TOKEN',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messaging_product: "whatsapp",
                        recipient_type: "individual",
                        to: activeChatNumber,
                        type: "text",
                        text: { preview_url: false, body: text }
                    })
                });
            } catch (e) { console.error("Error sending via Meta:", e); }
        }
    </script>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">
    <div class="bg-green-600 text-white p-4 shadow-md flex items-center">
        <h1 class="text-xl font-bold">Jh Seller CRM Dashboard</h1>
    </div>
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar Chat List -->
        <div id="chat-list" class="w-1/3 bg-white border-r overflow-y-auto">
            <p class="p-4 text-gray-400 text-center">No active chats yet...</p>
        </div>
        <!-- Chat Area -->
        <div class="w-2/3 flex flex-col bg-gray-100 relative">
            <div id="chat-box-placeholder" class="absolute inset-0 flex items-center justify-center text-gray-400 flex-col">
                <p class="text-lg">Click on a chat sequence to start replying</p>
            </div>
            <div id="active-chat-area" class="hidden flex flex-col h-full">
                <div class="bg-white p-4 border-b font-bold text-gray-700" id="chat-title">Chat</div>
                <div id="message-window" class="flex-1 p-4 overflow-y-auto flex flex-col bg-dashed"></div>
                <div class="p-4 bg-white border-t flex gap-2">
                    <input id="message-input" type="text" placeholder="Type your reply here..." class="flex-1 border p-2 rounded-lg outline-none focus:border-green-500">
                    <button onclick="sendMessage()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700">Send</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
