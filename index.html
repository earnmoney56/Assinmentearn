<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Support Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-green: #075e54; --wa-light: #128c7e; --bg-color: #ece5dd; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100%; width: 100%; overflow: hidden; }
        .wa-header { position: fixed; top: 0; left: 0; right: 0; background: var(--wa-green); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; font-size: 16px; height: 60px; z-index: 1000; }
        .wa-header .status-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; }
        .wa-header .sub-text { font-size: 11px; color: #b3d4d0; display: block; }
        .chat-container { position: absolute; top: 60px; bottom: 75px; left: 0; right: 0; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: var(--bg-color); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 8px 14px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.08); word-break: break-word; }
        .message.sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .message.received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .message img, .message video { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; max-height: 200px; }
        .message audio { max-width: 100%; margin-top: 5px; display: block; }
        .message .time { font-size: 10px; color: #667781; text-align: right; margin-top: 4px; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #f0f2f5; padding: 10px 12px 22px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #e9edef; height: 75px; z-index: 1000; }
        .input-wrapper { flex: 1; background: white; border-radius: 25px; display: flex; align-items: center; padding: 0 12px; border: 1px solid #ccc; height: 44px; gap: 8px; }
        .input-box { flex: 1; background: transparent; border: none; outline: none; font-size: 16px; height: 100%; }
        .icon-btn { color: #54656f; font-size: 20px; cursor: pointer; padding: 4px; }
        .icon-btn.recording { color: #e74c3c; animation: pulse 1s infinite; }
        .send-btn { background: var(--wa-light); color: white; width: 44px; height: 44px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #file-input { display: none; }
    </style>
</head>
<body>
    <div class="screen">
        <div class="wa-header">
            <i class="fas fa-user-circle" style="font-size: 32px;"></i>
            <div>
                <span style="font-weight: 600;">Support Team</span>
                <span class="sub-text"><span class="status-dot"></span> Active Online</span>
            </div>
        </div>
        <div class="chat-container" id="chat-box"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <label for="file-input" class="icon-btn"><i class="fas fa-paperclip"></i></label>
                <input type="file" id="file-input" accept="image/*,video/*">
                <input type="text" id="msg-input" class="input-box" placeholder="Type a message...">
                <i id="mic-btn" class="fas fa-microphone icon-btn"></i>
            </div>
            <button id="btn-send" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nkwllaxgrmmlrqacbaro.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZTqBnJInrVgfpegOJfS6KQ_wwzYSQf0";
        const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myUserId = localStorage.getItem('user_chat_uuid') || 'customer-' + Math.random().toString(36).substring(2, 15);
        localStorage.setItem('user_chat_uuid', myUserId);
        
        const currentRoomId = myUserId; 
        let mediaRecorder, audioChunks = [], isRecording = false;

        async function loadMessages() {
            const box = document.getElementById('chat-box');
            try {
                let { data: items, error } = await dbClient.from('messages').select('*').eq('room_id', currentRoomId).order('inserted_at', { ascending: true });
                if (!error && items) {
                    box.innerHTML = '';
                    items.forEach(m => renderMsg(m));
                }
            } catch(e) { console.error(e); }
        }

        function renderMsg(msg) {
            const box = document.getElementById('chat-box');
            if(!box || !msg.message_text) return;
            if (document.getElementById(`m-${msg.id}`)) return;
            
            const d = document.createElement('div');
            d.id = `m-${msg.id || Date.now()}`;
            d.classList.add('message', msg.sender === myUserId ? 'sent' : 'received');
            
            let contentHTML = `<div>${msg.message_text}</div>`;
            if(msg.media_url) {
                if(msg.type === 'image') contentHTML += `<img src="${msg.media_url}">`;
                else if(msg.type === 'video') contentHTML += `<video src="${msg.media_url}" controls></video>`;
                else if(msg.type === 'voice') contentHTML += `<audio src="${msg.media_url}" controls></audio>`;
            }
            d.innerHTML = contentHTML;
            
            const t = document.createElement('div');
            t.classList.add('time');
            t.innerText = new Date(msg.inserted_at || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            d.appendChild(t);
            
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';

            // Local render instantly so UI doesn't look stuck
            const tempId = 'temp-' + Date.now();
            renderMsg({ id: tempId, message_text: val, sender: myUserId, inserted_at: new Date() });

            try {
                await dbClient.from('messages').insert([{ 
                    message_text: val, 
                    sender: myUserId, 
                    receiver: 'admin', 
                    room_id: currentRoomId, 
                    type: 'text', 
                    media_url: null 
                }]);
            } catch(e) { console.log(e); }
        }

        async function uploadToSupabase(file, ext, folder) {
            const fileName = `${folder}/${Date.now()}-${Math.random().toString(36).substring(7)}.${ext}`;
            const { data, error } = await dbClient.storage.from('chat-media').upload(fileName, file);
            if (error) return null;
            return dbClient.storage.from('chat-media').getPublicUrl(fileName).data.publicUrl;
        }

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            let type = file.type.startsWith('video/') ? 'video' : 'image';
            const ext = file.name.split('.').pop();
            
            renderMsg({ id: 'media-temp', message_text: `Uploading ${type}...`, sender: myUserId });
            
            const publicUrl = await uploadToSupabase(file, ext, type);
            if(publicUrl) {
                await dbClient.from('messages').insert([{ message_text: `Sent a ${type}`, sender: myUserId, receiver: 'admin', room_id: currentRoomId, type: type, media_url: publicUrl }]);
                loadMessages();
            }
        });

        document.getElementById('mic-btn').addEventListener('click', async () => {
            const micBtn = document.getElementById('mic-btn');
            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const publicUrl = await uploadToSupabase(audioBlob, 'mp3', 'voice');
                    if(publicUrl) {
                        await dbClient.from('messages').insert([{ message_text: 'Voice Message', sender: myUserId, receiver: 'admin', room_id: currentRoomId, type: 'voice', media_url: publicUrl }]);
                        loadMessages();
                    }
                };
                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording', 'fa-stop');
            } else {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording', 'fa-stop');
            }
        });

        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        window.addEventListener('DOMContentLoaded', () => {
            loadMessages();
            dbClient.channel('custom-filter-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if(payload.new.room_id === currentRoomId) {
                    renderMsg(payload.new);
                }
            }).subscribe();
        });
    </script>
</body>
</html>
