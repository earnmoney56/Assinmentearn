<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Support Chat</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-green: #075e54; --wa-light: #128c7e; --bg-color: #ece5dd; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; }
        
        .wa-header { position: fixed; top: 0; left: 0; right: 0; background: var(--wa-green); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; font-size: 16px; height: 60px; z-index: 1000; }
        .wa-header .status-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; }
        
        /* Bound chat container exactly between header and input area */
        .chat-container { position: absolute; top: 60px; bottom: 60px; left: 0; right: 0; background-color: var(--bg-color); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .message { max-width: 75%; padding: 8px 12px 24px 12px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.08); word-break: break-word; color: black; display: inline-block; min-width: 90px; }
        .message.sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .message.received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        
        .msg-meta { position: absolute; bottom: 3px; right: 8px; font-size: 10px; color: #727272; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        .tick-icon { font-size: 11px; }
        .tick-blue { color: #34b7f1; }
        .tick-gray { color: #8696a0; }
        
        .chat-media { max-width: 100%; border-radius: 8px; margin-bottom: 4px; display: block; max-height: 200px; object-fit: cover; cursor: pointer; }
        .chat-link { color: #0275d8; text-decoration: underline; word-break: break-all; }
        
        /* Perfect Mobile Bottom Fixed Input Area */
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #f0f2f5; padding: 10px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #e9edef; height: 60px; z-index: 1000; }
        .input-wrapper { flex: 1; background: white; border-radius: 25px; display: flex; align-items: center; padding: 0 12px; border: 1px solid #ccc; height: 40px; gap: 8px; }
        .input-box { flex: 1; background: transparent; border: none; outline: none; font-size: 15px; height: 100%; color: black; }
        
        .attach-btn { color: #54656f; font-size: 18px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .send-btn { background: var(--wa-light); color: white; width: 40px; height: 40px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; flex-shrink: 0; }
        #file-input { display: none; }
    </style>
</head>
<body>
    <div class="wa-header">
        <i class="fas fa-user-circle" style="font-size: 32px;"></i>
        <div>
            <span style="font-weight: 600;">Support Team (Admin)</span>
            <span style="font-size: 11px; color: #b3d4d0; display: block;"><span class="status-dot"></span> Firebase Live</span>
        </div>
    </div>
    
    <div class="chat-container" id="chat-box"></div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <label for="file-input" class="attach-btn"><i class="fas fa-paperclip"></i></label>
            <input type="file" id="file-input" accept="image/*">
            <input type="text" id="msg-input" class="input-box" placeholder="Type a message...">
        </div>
        <button id="btn-send" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDe8zFsomI7Qn1PfuJb_FyWOLe1SdqEZHM",
            authDomain: "wattsapp-27aa4.firebaseapp.com",
            projectId: "wattsapp-27aa4",
            storageBucket: "wattsapp-27aa4.appspot.com",
            messagingSenderId: "826330591993",
            appId: "1:826330591993:web:51865cddf32ba8b5312028"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let myUserId = localStorage.getItem('user_chat_uuid') || 'User-' + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('user_chat_uuid', myUserId);

        function getTickHTML(status, isSent) {
            if (!isSent) return ''; 
            if (status === 'sent') return '<i class="fas fa-check tick-icon tick-gray"></i>';
            if (status === 'delivered') return '<i class="fas fa-check-double tick-icon tick-gray"></i>';
            if (status === 'seen') return '<i class="fas fa-check-double tick-icon tick-blue"></i>';
            return '';
        }

        function formatTime(timestamp) {
            if(!timestamp) return '';
            const date = new Date(timestamp);
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function linkify(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return '<a class="chat-link" href="' + url + '" target="_blank">' + url + '</a>';
            });
        }

        db.collection("messages").where("room_id", "==", myUserId).onSnapshot((snapshot) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            
            let sortedDocs = snapshot.docs.sort((a, b) => a.data().time_now - b.data().time_now);
            
            sortedDocs.forEach((doc) => {
                const m = doc.data();
                const isSentByMe = m.sender === myUserId;
                
                if (!isSentByMe && m.status !== 'seen') {
                    db.collection("messages").doc(doc.id).update({ status: 'seen' });
                }

                const d = document.createElement('div');
                d.classList.add('message', isSentByMe ? 'sent' : 'received');
                
                let contentHTML = '';
                if (m.type === 'image') {
                    contentHTML = `<img src="${m.file_url}" class="chat-media" onclick="window.open('${m.file_url}', '_blank')">`;
                } else {
                    contentHTML = `<div>${linkify(m.message_text)}</div>`;
                }
                
                const timeStr = formatTime(m.time_now);
                const tickHTML = getTickHTML(m.status, isSentByMe);

                d.innerHTML = `
                    ${contentHTML}
                    <div class="msg-meta">
                        <span>${timeStr}</span>
                        ${tickHTML}
                    </div>
                `;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });

        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';

            await db.collection("messages").add({
                message_text: val,
                sender: myUserId,
                receiver: 'admin',
                room_id: myUserId,
                time_now: Date.now(),
                type: 'text',
                status: 'sent'
            });
        }

        // Stable Public Engine for Customer Side Uploads (No Firebase Storage Needed)
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const inputField = document.getElementById('msg-input');
            inputField.placeholder = "Uploading image...";

            const formData = new FormData();
            formData.append('source', file);
            formData.append('action', 'upload');

            try {
                // High-speed FreeImage Cloud Upload API
                const response = await fetch('https://freeimage.host/api/1/upload?key=6d207e02198a847aa98d0a2a901485a5', {
                    method: 'POST',
                    body: formData
                });
                const resData = await response.json();
                
                if(resData.status_code === 200 && resData.image && resData.image.url) {
                    const downloadURL = resData.image.url;
                    await db.collection("messages").add({
                        message_text: "Sent an image",
                        file_url: downloadURL,
                        sender: myUserId,
                        receiver: 'admin',
                        room_id: myUserId,
                        time_now: Date.now(),
                        type: 'image',
                        status: 'sent'
                    });
                } else {
                    throw new Error("Primary cloud shift triggered.");
                }
            } catch (err) {
                console.log("Fallback routing initiated...");
                // Backup Fail-Safe engine in case of concurrency spikes
                const fbData = new FormData();
                fbData.append('image', file);
                try {
                    const resFb = await fetch('https://api.imgbb.com/1/upload?key=b092fb13a0785f7ff7f5bc657279f1df', {
                        method: 'POST',
                        body: fbData
                    });
                    const finalJson = await resFb.json();
                    if(finalJson.success) {
                        await db.collection("messages").add({
                            message_text: "Sent an image",
                            file_url: finalJson.data.url,
                            sender: myUserId,
                            receiver: 'admin',
                            room_id: myUserId,
                            time_now: Date.now(),
                            type: 'image',
                            status: 'sent'
                        });
                    } else {
                        alert("Network upload limit hit. Please try another image.");
                    }
                } catch(innerErr) {
                    alert("Server busy, please refresh and re-upload.");
                }
            }
            
            inputField.placeholder = "Type a message...";
            e.target.value = ''; 
        });

        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
