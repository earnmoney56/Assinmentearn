<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #dadbd3; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .chat-container { width: 100%; max-width: 450px; height: 100vh; background: #efeae2; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        
        /* Inbox View Styles */
        #inbox-view { padding: 10px; }
        .user-item { background: white; padding: 15px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user-item:hover { background: #f0f2f5; }
        
        /* Chat Interface Styles (Same as before) */
        #chat-view { display: none; flex-direction: column; height: 100%; }
        .chat-header { background: #004d40; color: white; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        /* Message Styles kept same to avoid breaking logic */
        .msg { max-width: 80%; padding: 6px 9px; border-radius: 8px; font-size: 14.5px; word-wrap: break-word; position: relative; display: flex; align-items: flex-end; flex-wrap: wrap; gap: 15px; }
        .sent-by-me { background: #d9fdd3; align-self: flex-end; }
        .received-by-me { background: #ffffff; align-self: flex-start; }
        .msg-meta { margin-left: auto; font-size: 10px; color: #667781; }
        .tick { font-size: 12px; margin-left: 1px; }
        .tick.read { color: #53bdeb; }
        
        .chat-input-area { padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 8px; }
        .input-container { flex: 1; background: #fff; border-radius: 24px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; border: none; outline: none; padding: 5px; }
        .send-btn { background: #005c4b; color: white; border: none; padding: 10px 15px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- Inbox View -->
    <div id="inbox-view">
        <h3 style="padding: 10px; color: #004d40;">Conversations</h3>
        <div id="userList"></div>
    </div>

    <!-- Chat View -->
    <div id="chat-view">
        <div class="chat-header">
            <button onclick="goBack()" style="background:none; border:none; color:white; font-size:20px;">←</button>
            <span id="chatTitle">Chat</span>
        </div>
        <div class="chat-messages" id="chatBox"></div>
        <div class="chat-input-area">
            <div class="input-container">
                <input type="text" id="msgInput" placeholder="Reply...">
            </div>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // Firebase Config remains same
    const firebaseConfig = { /* ...YOUR CONFIG... */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let activeDocId = "";

    // 1. Load User List (Inbox)
    async function loadInbox() {
        document.getElementById('inbox-view').style.display = 'block';
        document.getElementById('chat-view').style.display = 'none';
        const snapshot = await getDocs(collection(db, "group_messages"));
        const userList = document.getElementById('userList');
        userList.innerHTML = "";
        snapshot.forEach(doc => {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `<div><strong>Customer ID:</strong> ${doc.id}</div>`;
            div.onclick = () => openChat(doc.id);
            userList.appendChild(div);
        });
    }

    // 2. Open Specific Chat
    function openChat(id) {
        activeDocId = id;
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'flex';
        document.getElementById('chatTitle').innerText = "Chat with " + id;
        loadChatMessages();
    }

    function goBack() { loadInbox(); }

    // 3. Chat Logic (Same as before)
    function loadChatMessages() {
        const q = query(collection(db, "group_messages", activeDocId, "messages"), orderBy("time_now", "asc"));
        onSnapshot(q, (snapshot) => {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            snapshot.forEach(snapshotDoc => {
                const data = snapshotDoc.data();
                renderMsg(data);
            });
        });
    }

    function renderMsg(data) {
        const div = document.createElement('div');
        div.className = `msg ${data.sender === 'admin' ? 'sent-by-me' : 'received-by-me'}`;
        div.innerHTML = `${data.message_text || data.content} <div class="msg-meta">${data.time_label || ''}</div>`;
        document.getElementById('chatBox').appendChild(div);
    }

    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        await addDoc(collection(db, "group_messages", activeDocId, "messages"), {
            sender: 'admin',
            message_text: text,
            time_now: Date.now(),
            time_label: new Date().toLocaleTimeString(),
            status: 'sent'
        });
        document.getElementById('msgInput').value = "";
    };

    loadInbox(); // Start here
</script>
</body>
</html>
