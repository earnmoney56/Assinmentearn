<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #f0f2f5; color: black; overflow: hidden; }
        
        /* Fixed Sidebar Layout */
        .sidebar { width: 160px; background: white; border-right: 1px solid #e9edef; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { background: #075e54; color: white; padding: 12px 10px; font-weight: bold; font-size: 14px; height: 50px; display: flex; align-items: center; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 12px 10px; border-bottom: 1px solid #f0f2f5; cursor: pointer; font-weight: 600; font-size: 13px; color: black; position: relative; word-break: break-all; }
        
        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #ece5dd; height: 100%; overflow: hidden; }
        .chat-header { background: #075e54; color: white; padding: 12px; font-size: 15px; height: 50px; display: flex; align-items: center; overflow: hidden; }
        .chat-header h4 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        
        /* Scrollable Chat Box */
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Messages Styling */
        .msg { max-width: 75%; padding: 6px 10px 22px 12px; border-radius: 8px; font-size: 14px; color: black; position: relative; display: inline-block; box-shadow: 0 1px 2px rgba(0,0,0,0.08); word-break: break-word; min-width: 90px; }
        .msg.sent { background: #d9fdd3; align-self: flex-end; }
        .msg.received { background: white; align-self: flex-start; }
        
        /* Media Fixes */
        .chat-media { max-width: 100%; width: 180px; height: auto; border-radius: 6px; margin-bottom: 4px; display: block; object-fit: cover; cursor: pointer; }
        .chat-link { color: #0275d8; text-decoration: underline; word-break: break-all; }
        
        /* Meta Tags (Time & Ticks) */
        .msg-meta { position: absolute; bottom: 3px; right: 7px; font-size: 9px; color: #727272; display: flex; align-items: center; gap: 3px; white-space: nowrap; }
        .tick-icon { font-size: 10px; }
        .tick-blue { color: #34b7f1; }
        .tick-gray { color: #8696a0; }
        
        /* Footer Input Area */
        .input-area { background: #f0f2f5; padding: 10px; display: flex; gap: 8px; align-items: center; }
        .input-box { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 14px; color: black; background: white; }
        .send-btn { background: #128c7e; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">Active Chats</div>
        <div class="user-list" id="users-container"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header"><h4 id="active-user-title">Select Chat</h4></div>
        <div class="chat-box" id="admin-chat-box"></div>
        <div class="input-area">
            <input type="text" id="admin-msg-input" class="input-box" placeholder="Reply...">
            <button id="admin-send-btn" class="send-btn">Send</button>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDe8zFsomI7Qn1PfuJb_FyWOLe1SdqEZHM",
            authDomain: "wattsapp-27aa4.firebaseapp.com",
            projectId: "wattsapp-27aa4",
            storageBucket: "wattsapp-27aa4.appspot.com",
            messagingSenderId: "826330591993",
            appId: "1:826330591993:web:51865cddf32ba8b5312028"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let selectedRoomId = null;
        let unsubscribeMessages = null;

        function getTickHTML(status, isSent) {
            if (!isSent) return '';
            if (status === 'sent') return '<i class="fas fa-check tick-icon tick-gray"></i>';
            if (status === 'delivered') return '<i class="fas fa-check-double tick-icon tick-gray"></i>';
            if (status === 'seen') return '<i class="fas fa-check-double tick-icon tick-blue"></i>';
            return '';
        }

        function formatTime(timestamp) {
            if(!timestamp) return '';
            const date = new Date(timestamp);
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function linkify(text) {
            if(!text) return '';
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return '<a class="chat-link" href="' + url + '" target="_blank">' + url + '</a>';
            });
        }

        // Stream all active rooms and auto-deliver
        db.collection("messages").onSnapshot((snapshot) => {
            const container = document.getElementById('users-container');
            const rooms = [];
            
            snapshot.forEach(doc => {
                const data = doc.data();
                if(data.room_id) {
                    rooms.push(data.room_id);
                }
                if (data.sender !== 'admin' && data.status === 'sent') {
                    db.collection("messages").doc(doc.id).update({ status: 'delivered' });
                }
            });

            const uniqueRooms = [...new Set(rooms)].filter(Boolean);
            container.innerHTML = '';
            uniqueRooms.forEach(room => {
                const div = document.createElement('div');
                div.classList.add('user-item');
                if(room === selectedRoomId) div.style.background = "#e9edef";
                div.innerText = room;
                div.onclick = () => loadActiveRoom(room);
                container.appendChild(div);
            });
        });

        function loadActiveRoom(room) {
            selectedRoomId = room;
            document.getElementById('active-user-title').innerText = room;
            if(unsubscribeMessages) unsubscribeMessages();
            
            unsubscribeMessages = db.collection("messages").where("room_id", "==", room).onSnapshot((snapshot) => {
                const box = document.getElementById('admin-chat-box');
                box.innerHTML = '';
                
                let sortedDocs = snapshot.docs.sort((a, b) => a.data().time_now - b.data().time_now);
                
                sortedDocs.forEach(doc => {
                    const m = doc.data();
                    const isSentByAdmin = m.sender === 'admin';

                    if (!isSentByAdmin && m.status !== 'seen') {
                        db.collection("messages").doc(doc.id).update({ status: 'seen' });
                    }

                    const d = document.createElement('div');
                    d.classList.add('msg', isSentByAdmin ? 'sent' : 'received');
                    
                    // Render Image/Video/Audio Content Safely
                    let contentHTML = '';
                    if (m.type === 'image' && m.file_url) {
                        contentHTML = `<img src="${m.file_url}" class="chat-media" onclick="window.open('${m.file_url}', '_blank')">`;
                    } else if (m.type === 'video' && m.file_url) {
                        contentHTML = `<video src="${m.file_url}" class="chat-media" controls></video>`;
                    } else if (m.type === 'audio' && m.file_url) {
                        contentHTML = `<audio src="${m.file_url}" controls style="max-width:100%; height:32px; margin-bottom:4px;"></audio>`;
                    } else {
                        contentHTML = `<div>${linkify(m.message_text || '')}</div>`;
                    }

                    const timeStr = formatTime(m.time_now);
                    const tickHTML = getTickHTML(m.status, isSentByAdmin);

                    d.innerHTML = `
                        ${contentHTML}
                        <div class="msg-meta">
                            <span>${timeStr}</span>
                            ${tickHTML}
                        </div>
                    `;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendAdminMessage() {
            if(!selectedRoomId) return;
            const inp = document.getElementById('admin-msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';
            
            await db.collection("messages").add({
                message_text: val,
                sender: 'admin',
                receiver: selectedRoomId,
                room_id: selectedRoomId,
                time_now: Date.now(),
                type: 'text',
                status: 'sent'
            });
        }
        document.getElementById('admin-send-btn').addEventListener('click', sendAdminMessage);
        document.getElementById('admin-msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAdminMessage(); });
    </script>
</body>
</html>
