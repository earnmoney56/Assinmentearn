<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { font-family: 'Segoe UI', sans-serif; height: 100vh; height: 100dvh; width: 100vw; background: #f0f2f5; color: black; overflow: hidden; }
        
        .dashboard-container { display: flex; height: 100%; width: 100%; overflow: hidden; }
        
        .sidebar { width: 120px; background: white; border-right: 1px solid #e9edef; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { background: #075e54; color: white; padding: 12px 4px; font-weight: bold; font-size: 11px; text-align: center; }
        .user-list { flex: 1; overflow-y: auto; }
        
        .user-item { padding: 12px 6px; border-bottom: 1px solid #f0f2f5; cursor: pointer; font-weight: 600; font-size: 11px; color: black; word-break: break-all; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .user-name-text { flex: 1; text-align: left; padding-right: 4px; overflow: hidden; text-overflow: ellipsis; }
        
        .noti-badge { background: #25d366; color: white; font-size: 9px; font-weight: bold; border-radius: 50%; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 2px; flex-shrink: 0; }
        
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #ece5dd; height: 100%; overflow: hidden; position: relative; }
        .chat-header { background: #075e54; color: white; padding: 12px; font-size: 13px; font-weight: bold; flex-shrink: 0; }
        .chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { max-width: 85%; padding: 6px 10px 20px 10px; border-radius: 8px; font-size: 13px; color: black; position: relative; display: inline-block; box-shadow: 0 1px 1px rgba(0,0,0,0.08); min-width: 80px; }
        .msg.sent { background: #d9fdd3; align-self: flex-end; }
        .msg.received { background: white; align-self: flex-start; }
        
        .msg-meta { position: absolute; bottom: 2px; right: 6px; font-size: 8px; color: #727272; display: flex; align-items: center; gap: 2px; white-space: nowrap; }
        .tick-icon { font-size: 9px; }
        .tick-blue { color: #34b7f1; }
        .tick-gray { color: #8696a0; }
        
        .chat-media { max-width: 100%; border-radius: 6px; margin-bottom: 2px; display: block; max-height: 130px; object-fit: cover; cursor: pointer; }
        .chat-link { color: #0275d8; text-decoration: underline; word-break: break-all; }
        
        .input-area { background: #f0f2f5; padding: 8px; display: flex; gap: 6px; align-items: center; border-top: 1px solid #e9edef; flex-shrink: 0; width: 100%; }
        .input-wrapper { flex: 1; background: white; border-radius: 20px; display: flex; align-items: center; padding: 0 8px; border: 1px solid #ccc; height: 36px; gap: 6px; }
        .input-box { flex: 1; background: transparent; border: none; outline: none; font-size: 13px; color: black; height: 100%; }
        
        .attach-btn { color: #54656f; font-size: 16px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .send-btn { background: #128c7e; color: white; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        #admin-file-input { display: none; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="sidebar">
            <div class="sidebar-header">Chats</div>
            <div class="user-list" id="users-container"></div>
        </div>
        
        <div class="main-chat">
            <div class="chat-header"><span id="active-user-title">Select Chat</span></div>
            <div class="chat-box" id="admin-chat-box"></div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <label for="admin-file-input" class="attach-btn"><i class="fas fa-paperclip"></i></label>
                    <input type="file" id="admin-file-input" accept="image/*">
                    <input type="text" id="admin-msg-input" class="input-box" placeholder="Type a reply...">
                </div>
                <button id="admin-send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDe8zFsomI7Qn1PfuJb_FyWOLe1SdqEZHM",
            authDomain: "wattsapp-27aa4.firebaseapp.com",
            projectId: "wattsapp-27aa4",
            storageBucket: "wattsapp-27aa4.appspot.com",
            messagingSenderId: "826330591993",
            appId: "1:826330591993:web:51865cddf32ba8b5312028"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let selectedRoomId = null;
        let unsubscribeMessages = null;
        let roomMapping = {}; 

        function getTickHTML(status, isSent) {
            if (!isSent) return '';
            if (status === 'sent') return '<i class="fas fa-check tick-icon tick-gray"></i>';
            if (status === 'delivered') return '<i class="fas fa-check-double tick-icon tick-gray"></i>';
            if (status === 'seen') return '<i class="fas fa-check-double tick-icon tick-blue"></i>';
            return '';
        }

        function formatTime(timestamp) {
            if(!timestamp) return '';
            const date = new Date(timestamp);
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function linkify(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return '<a class="chat-link" href="' + url + '" target="_blank">' + url + '</a>';
            });
        }

        db.collection("messages").onSnapshot((snapshot) => {
            const container = document.getElementById('users-container');
            const roomsData = {};

            snapshot.forEach(doc => {
                const data = doc.data();
                const rId = data.room_id;
                if (!rId) return;

                if (!roomsData[rId]) {
                    roomsData[rId] = { unreadCount: 0, earliestTime: data.time_now || Date.now() };
                }
                if (data.time_now && data.time_now < roomsData[rId].earliestTime) {
                    roomsData[rId].earliestTime = data.time_now;
                }
                
                if (data.sender !== 'admin' && data.status !== 'seen') {
                    roomsData[rId].unreadCount++;
                    if (data.status === 'sent') {
                        db.collection("messages").doc(doc.id).update({ status: 'delivered' });
                    }
                }
            });

            const sortedRooms = Object.keys(roomsData).sort((a, b) => roomsData[a].earliestTime - roomsData[b].earliestTime);

            sortedRooms.forEach((room, index) => {
                if (!roomMapping[room]) {
                    roomMapping[room] = `User ${index + 1}`;
                }
            });

            container.innerHTML = '';
            sortedRooms.forEach(room => {
                const friendlyName = roomMapping[room] || room;
                const div = document.createElement('div');
                div.classList.add('user-item');
                if(room === selectedRoomId) div.style.background = "#e9edef";
                
                let unreadBadgeHTML = '';
                if (roomsData[room].unreadCount > 0 && room !== selectedRoomId) {
                    unreadBadgeHTML = `<span class="noti-badge">${roomsData[room].unreadCount}</span>`;
                }

                div.innerHTML = `
                    <span class="user-name-text">${friendlyName}</span>
                    ${unreadBadgeHTML}
                `;
                
                div.onclick = () => loadActiveRoom(room);
                container.appendChild(div);
            });
        });

        function loadActiveRoom(room) {
            selectedRoomId = room;
            const friendlyName = roomMapping[room] || room;
            document.getElementById('active-user-title').innerText = friendlyName;
            
            if(unsubscribeMessages) unsubscribeMessages();
            
            unsubscribeMessages = db.collection("messages").where("room_id", "==", room).onSnapshot((snapshot) => {
                const box = document.getElementById('admin-chat-box');
                box.innerHTML = '';
                
                let sortedDocs = snapshot.docs.sort((a, b) => a.data().time_now - b.data().time_now);
                
                sortedDocs.forEach(doc => {
                    const m = doc.data();
                    const isSentByAdmin = m.sender === 'admin';

                    if (!isSentByAdmin && m.status !== 'seen') {
                        db.collection("messages").doc(doc.id).update({ status: 'seen' });
                    }

                    const d = document.createElement('div');
                    d.classList.add('msg', isSentByAdmin ? 'sent' : 'received');
                    
                    let contentHTML = '';
                    if (m.type === 'image') {
                        contentHTML = `<img src="${m.file_url}" class="chat-media" onclick="window.open('${m.file_url}', '_blank')">`;
                    } else {
                        contentHTML = `<div>${linkify(m.message_text)}</div>`;
                    }
                    
                    const timeStr = formatTime(m.time_now);
                    const tickHTML = getTickHTML(m.status, isSentByAdmin);

                    d.innerHTML = `
                        ${contentHTML}
                        <div class="msg-meta">
                            <span>${timeStr}</span>
                            ${tickHTML}
                        </div>
                    `;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendAdminMessage() {
            if(!selectedRoomId) return;
            const inp = document.getElementById('admin-msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';
            
            await db.collection("messages").add({
                message_text: val,
                sender: 'admin',
                receiver: selectedRoomId,
                room_id: selectedRoomId,
                time_now: Date.now(),
                type: 'text',
                status: 'sent'
            });
        }

        // Free Cloud Upload Service (Alternative to Storage)
        document.getElementById('admin-file-input').addEventListener('change', async (e) => {
            if (!selectedRoomId) return;
            const file = e.target.files[0];
            if (!file) return;

            const inputField = document.getElementById('admin-msg-input');
            inputField.placeholder = "Uploading image...";

            const formData = new FormData();
            formData.append('image', file);

            try {
                // Uploading via free anonymous image cloud provider
                const response = await fetch('https://api.imgbb.com/1/upload?key=6d207e02198a847aa98d0a2a901485a5', {
                    method: 'POST',
                    body: formData
                });
                const resData = await response.json();
                
                if(resData.success) {
                    const downloadURL = resData.data.url;
                    await db.collection("messages").add({
                        message_text: "Sent an image",
                        file_url: downloadURL,
                        sender: 'admin',
                        receiver: selectedRoomId,
                        room_id: selectedRoomId,
                        time_now: Date.now(),
                        type: 'image',
                        status: 'sent'
                    });
                } else {
                    alert("Upload failed from server provider.");
                }
            } catch (err) {
                console.error(err);
                alert("Network error while uploading asset.");
            }
            inputField.placeholder = "Type a reply...";
            e.target.value = '';
        });

        document.getElementById('admin-send-btn').addEventListener('click', sendAdminMessage);
        document.getElementById('admin-msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAdminMessage(); });
    </script>
</body>
</html>
