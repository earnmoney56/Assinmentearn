<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #f0f2f5; }
        .sidebar { width: 300px; background: white; border-right: 1px solid #e9edef; display: flex; flex-direction: column; }
        .sidebar-header { background: #075e54; color: white; padding: 15px; font-weight: bold; font-size: 16px; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #f0f2f5; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: #111b21; }
        .user-item:hover, .user-item.active { background: #f0f2f5; }
        .status-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #ece5dd; }
        .chat-header { background: #075e54; color: white; padding: 15px; display: flex; flex-direction: column; gap: 2px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px; border-radius: 8px; font-size: 15px; word-break: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.06); }
        .msg.sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .msg.received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .input-area { background: #f0f2f5; padding: 15px; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 15px; }
        .send-btn { background: #128c7e; color: white; border: none; padding: 12px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Active Support Chats</div>
        <div class="user-list" id="users-container"></div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <h4 id="active-user-title">Select a Chat</h4>
            <small style="color: #b3d4d0;">Live Connected Sync</small>
        </div>
        <div class="chat-box" id="admin-chat-box"></div>
        <div class="input-area">
            <input type="text" id="admin-msg-input" class="input-box" placeholder="Type a reply...">
            <button id="admin-send-btn" class="send-btn">Send</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nkwllaxgrmmlrqacbaro.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZTqBnJInrVgfpegOJfS6KQ_wwzYSQf0";
        const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let selectedRoomId = null;
        let lastMessagesLength = 0;
        let knownRoomsJson = "";

        async function syncData() {
            // 1. Inbox list updates fetch karein
            let { data: allMessages } = await dbClient.from('messages').select('room_id').order('inserted_at', { ascending: false });
            if (allMessages) {
                const uniqueRooms = [...new Set(allMessages.map(m => m.room_id))].filter(Boolean);
                const currentJson = JSON.stringify(uniqueRooms);
                
                if (currentJson !== knownRoomsJson) {
                    knownRoomsJson = currentJson;
                    const container = document.getElementById('users-container');
                    container.innerHTML = '';
                    uniqueRooms.forEach(room => {
                        const div = document.createElement('div');
                        div.classList.add('user-item');
                        if(room === selectedRoomId) div.classList.add('active');
                        div.innerHTML = `<span>${room}</span> <span class="status-dot"></span>`;
                        div.onclick = () => {
                            selectedRoomId = room;
                            document.getElementById('active-user-title').innerText = room;
                            lastMessagesLength = 0; 
                            syncData();
                        };
                        container.appendChild(div);
                    });
                }
            }

            // 2. Active Chat ke andar ke messages track karein
            if (selectedRoomId) {
                let { data: items } = await dbClient.from('messages').select('*').eq('room_id', selectedRoomId).order('inserted_at', { ascending: true });
                if (items && items.length !== lastMessagesLength) {
                    lastMessagesLength = items.length;
                    const box = document.getElementById('admin-chat-box');
                    box.innerHTML = '';
                    items.forEach(m => {
                        const d = document.createElement('div');
                        d.classList.add('msg', m.sender === 'admin' ? 'sent' : 'received');
                        d.innerText = m.message_text;
                        box.appendChild(d);
                    });
                    box.scrollTop = box.scrollHeight;
                }
            }
        }

        async function sendAdminMessage() {
            if(!selectedRoomId) return;
            const inp = document.getElementById('admin-msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';

            await dbClient.from('messages').insert([{
                message_text: val,
                sender: 'admin',
                receiver: selectedRoomId,
                room_id: selectedRoomId,
                type: 'text'
            }]);
            syncData();
        }

        document.getElementById('admin-send-btn').addEventListener('click', sendAdminMessage);
        document.getElementById('admin-msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAdminMessage(); });
        
        window.addEventListener('DOMContentLoaded', () => {
            syncData();
            setInterval(syncData, 2000); // Admin background loop
        });
    </script>
</body>
</html>
