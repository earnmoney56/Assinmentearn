<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #f0f2f5; }
        .sidebar { width: 300px; background: white; border-right: 1px solid #e9edef; display: flex; flex-direction: column; }
        .sidebar-header { background: #075e54; color: white; padding: 15px; font-weight: bold; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #f0f2f5; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .user-item:hover, .user-item.active { background: #e9edef; }
        .status-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; }
        .status-dot.offline { background: #95a5a6; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #ece5dd; }
        .chat-header { background: #075e54; color: white; padding: 15px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px; border-radius: 8px; font-size: 15px; word-break: break-word; }
        .msg.sent { background: #d9fdd3; align-self: flex-end; }
        .msg.received { background: white; align-self: flex-start; }
        .input-area { background: #f0f2f5; padding: 15px; display: flex; gap: 10px; }
        .input-box { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .send-btn { background: #128c7e; color: white; border: none; padding: 0 25px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Active Support Chats</div>
        <div class="user-list" id="users-container"></div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <h4 id="active-user-title">Select a Chat</h4>
            <small id="user-status-text">Offline</small>
        </div>
        <div class="chat-box" id="admin-chat-box"></div>
        <div class="input-area">
            <input type="text" id="admin-msg-input" class="input-box" placeholder="Type a reply...">
            <button id="admin-send-btn" class="send-btn">Send</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nkwllaxgrmmlrqacbaro.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZTqBnJInrVgfpegOJfS6KQ_wwzYSQf0";
        const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let selectedRoomId = null;
        let globalPresence = {};

        async function loadInboxes() {
            let { data: messages } = await dbClient.from('messages').select('room_id').order('inserted_at', { ascending: false });
            if (messages) {
                const uniqueRooms = [...new Set(messages.map(m => m.room_id))].filter(Boolean);
                const container = document.getElementById('users-container');
                container.innerHTML = '';
                
                uniqueRooms.forEach(room => {
                    const div = document.createElement('div');
                    div.classList.add('user-item');
                    if(room === selectedRoomId) div.classList.add('active');
                    
                    const isOnline = globalPresence[room];
                    div.innerHTML = `<span>${room}</span> <span class="status-dot ${isOnline ? '' : 'offline'}"></span>`;
                    
                    div.onclick = () => {
                        selectedRoomId = room;
                        document.getElementById('active-user-title').innerText = room;
                        updateUserStatusUI();
                        loadAdminMessages();
                        loadInboxes();
                    };
                    container.appendChild(div);
                });
            }
        }

        async function loadAdminMessages() {
            if(!selectedRoomId) return;
            let { data: items } = await dbClient.from('messages').select('*').eq('room_id', selectedRoomId).order('inserted_at', { ascending: true });
            const box = document.getElementById('admin-chat-box');
            box.innerHTML = '';
            if(items) {
                items.forEach(m => {
                    const d = document.createElement('div');
                    d.classList.add('msg', m.sender === 'admin' ? 'sent' : 'received');
                    d.innerText = m.message_text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            }
        }

        async function sendAdminMessage() {
            if(!selectedRoomId) return;
            const inp = document.getElementById('admin-msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';

            // Fast display locally
            const box = document.getElementById('admin-chat-box');
            const d = document.createElement('div');
            d.classList.add('msg', 'sent');
            d.innerText = val;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;

            await dbClient.from('messages').insert([{
                message_text: val,
                sender: 'admin',
                receiver: selectedRoomId,
                room_id: selectedRoomId,
                type: 'text'
            }]);
        }

        function updateUserStatusUI() {
            if(!selectedRoomId) return;
            const statusText = document.getElementById('user-status-text');
            if (globalPresence[selectedRoomId]) {
                statusText.innerText = "Online";
            } else {
                statusText.innerText = "Offline / Last seen recently";
            }
        }

        // Presence Listener
        const trackChannel = dbClient.channel('presence-global', { config: { presence: { key: 'admin' } } });
        
        trackChannel
        .on('presence', { event: 'sync' }, () => {
            globalPresence = trackChannel.presenceState();
            loadInboxes();
            updateUserStatusUI();
        })
        .on('presence', { event: 'leave' }, ({ key }) => {
            if(key === selectedRoomId) {
                const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                document.getElementById('user-status-text').innerText = `Last seen at ${now}`;
            }
            loadInboxes();
        })
        .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await trackChannel.track({ online_at: new Date().toISOString() });
            }
        });

        // Realtime Table DB Listener
        dbClient.channel('admin-db-changes')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            loadInboxes();
            if(payload.new.room_id === selectedRoomId) {
                loadAdminMessages();
            }
        })
        .subscribe();

        document.getElementById('admin-send-btn').addEventListener('click', sendAdminMessage);
        document.getElementById('admin-msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAdminMessage(); });
        window.addEventListener('DOMContentLoaded', loadInboxes);
    </script>
</body>
</html>
