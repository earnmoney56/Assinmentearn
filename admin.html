<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --wa-bg: #efeae2;
            --wa-sidebar-bg: #ffffff;
            --wa-chat-in: #ffffff;
            --wa-chat-out: #d9fdd3;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Fixed Viewport Heights for Mobile Keyboards */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            height: 100vh; 
            height: -webkit-fill-available;
            background: #f0f2f5; 
            color: #111b21; 
            overflow: hidden; 
        }
        
        /* Left Sidebar layout */
        .sidebar { width: 25%; min-width: 140px; max-width: 320px; background: var(--wa-sidebar-bg); border-right: 1px solid #e9edef; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { background: #f0f2f5; color: #111b21; padding: 10px 12px; font-weight: 700; font-size: 14px; height: 55px; display: flex; align-items: center; border-bottom: 1px solid #e9edef; }
        .user-list { flex: 1; overflow-y: auto; background: #fff; }
        .user-item { padding: 12px 10px; border-bottom: 1px solid #f0f2f5; cursor: pointer; font-weight: 600; font-size: 12.5px; color: #111b21; display: flex; align-items: center; gap: 8px; transition: background 0.2s; word-break: break-all; }
        .user-item:hover { background: #f0f2f5; }
        .user-item i { color: #54656f; font-size: 16px; }
        
        /* Main Dynamic Chat Window */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--wa-bg); height: 100%; min-width: 0; position: relative; }
        .chat-header { background: #f0f2f5; color: #111b21; padding: 10px 16px; height: 55px; display: flex; align-items: center; border-bottom: 1px solid #e9edef; flex-shrink: 0; }
        .chat-header h4 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
        
        /* Auto-Sizing Scrolling Chat Stream */
        .chat-box { flex: 1 1 auto; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Chat bubble updates */
        .msg { max-width: 75%; padding: 6px 10px 20px 12px; border-radius: 8px; font-size: 13.5px; color: #111b21; position: relative; display: inline-block; box-shadow: 0 1px 1px rgba(0,0,0,0.06); word-break: break-word; min-width: 80px; }
        .msg.sent { background: var(--wa-chat-out); align-self: flex-end; border-top-right-radius: 0; }
        .msg.received { background: var(--wa-chat-in); align-self: flex-start; border-top-left-radius: 0; }
        
        /* Media Attachments Customizer */
        .chat-media { max-width: 100%; width: 180px; height: auto; max-height: 240px; border-radius: 6px; margin: 2px 0 4px 0; display: block; object-fit: cover; cursor: pointer; }
        .chat-link { color: #0275d8; text-decoration: none; word-break: break-all; }
        
        /* Metadata Alignments */
        .msg-meta { position: absolute; bottom: 3px; right: 7px; font-size: 9.5px; color: #667781; display: flex; align-items: center; gap: 3px; white-space: nowrap; }
        .tick-icon { font-size: 10px; }
        .tick-blue { color: #53bdeb; }
        .tick-gray { color: #8696a0; }
        
        /* Safe Input Panel Layout Fixes */
        .input-area { background: #f0f2f5; padding: 8px 12px; display: flex; gap: 8px; align-items: center; height: 55px; flex-shrink: 0; border-top: 1px solid #e9edef; position: relative; width: 100%; }
        .input-box { flex: 1; padding: 10px 14px; border-radius: 20px; border: none; outline: none; font-size: 14px; color: #111b21; background: white; min-width: 0; }
        .send-btn { background: #00a884; color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 14px; flex-shrink: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .send-btn:hover { background: #008069; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">Active Chats</div>
        <div class="user-list" id="users-container"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header"><h4 id="active-user-title"><i class="fas fa-comments" style="color:#00a884;"></i> Select a Chat</h4></div>
        <div class="chat-box" id="admin-chat-box"></div>
        <div class="input-area">
            <input type="text" id="admin-msg-input" class="input-box" placeholder="Type a reply...">
            <button id="admin-send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDe8zFsomI7Qn1PfuJb_FyWOLe1SdqEZHM",
            authDomain: "wattsapp-27aa4.firebaseapp.com",
            projectId: "wattsapp-27aa4",
            storageBucket: "wattsapp-27aa4.appspot.com",
            messagingSenderId: "826330591993",
            appId: "1:826330591993:web:51865cddf32ba8b5312028"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let selectedRoomId = null;
        let unsubscribeMessages = null;

        function getTickHTML(status, isSent) {
            if (!isSent) return '';
            if (status === 'sent') return '<i class="fas fa-check tick-icon tick-gray"></i>';
            if (status === 'delivered') return '<i class="fas fa-check-double tick-icon tick-gray"></i>';
            if (status === 'seen') return '<i class="fas fa-check-double tick-icon tick-blue"></i>';
            return '';
        }

        function formatTime(timestamp) {
            if(!timestamp) return '';
            const date = new Date(timestamp);
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function linkify(text) {
            if(!text) return '';
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return '<a class="chat-link" href="' + url + '" target="_blank">' + url + '</a>';
            });
        }

        // Active Rooms Engine
        db.collection("messages").onSnapshot((snapshot) => {
            const container = document.getElementById('users-container');
            const rooms = [];
            
            snapshot.forEach(doc => {
                const data = doc.data();
                if(data.room_id) {
                    rooms.push(data.room_id);
                }
            });

            const uniqueRooms = [...new Set(rooms)].filter(Boolean);
            container.innerHTML = '';
            
            uniqueRooms.forEach(room => {
                const div = document.createElement('div');
                div.classList.add('user-item');
                if(room === selectedRoomId) div.style.background = "#efeae2";
                
                div.innerHTML = `<i class="fas fa-user-circle"></i> <span>${room}</span>`;
                div.onclick = () => loadActiveRoom(room);
                container.appendChild(div);
            });
        });

        // Safe Sync Engine
        function loadActiveRoom(room) {
            selectedRoomId = room;
            document.getElementById('active-user-title').innerHTML = `<i class="fas fa-user-circle" style="color:#54656f; font-size:18px;"></i> &nbsp;<b>${room}</b>`;
            if(unsubscribeMessages) unsubscribeMessages();
            
            unsubscribeMessages = db.collection("messages").where("room_id", "==", room).onSnapshot((snapshot) => {
                const box = document.getElementById('admin-chat-box');
                box.innerHTML = '';
                
                let sortedDocs = snapshot.docs.sort((a, b) => a.data().time_now - b.data().time_now);
                
                sortedDocs.forEach(doc => {
                    const m = doc.data();
                    const isSentByAdmin = m.sender === 'admin';

                    if (!isSentByAdmin && m.status !== 'seen') {
                        db.collection("messages").doc(doc.id).update({ status: 'seen' });
                    }

                    const d = document.createElement('div');
                    d.classList.add('msg', isSentByAdmin ? 'sent' : 'received');
                    
                    let contentHTML = '';
                    if (m.type === 'image' && m.file_url) {
                        contentHTML = `<img src="${m.file_url}" class="chat-media" onclick="window.open('${m.file_url}', '_blank')">`;
                    } else if (m.type === 'video' && m.file_url) {
                        contentHTML = `<video src="${m.file_url}" class="chat-media" controls></video>`;
                    } else if (m.type === 'audio' && m.file_url) {
                        contentHTML = `<audio src="${m.file_url}" controls style="max-width:100%; height:32px; margin-bottom:4px;"></audio>`;
                    } else {
                        contentHTML = `<div>${linkify(m.message_text || '')}</div>`;
                    }

                    const timeStr = formatTime(m.time_now);
                    const tickHTML = getTickHTML(m.status, isSentByAdmin);

                    d.innerHTML = `
                        ${contentHTML}
                        <div class="msg-meta">
                            <span>${timeStr}</span>
                            ${tickHTML}
                        </div>
                    `;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendAdminMessage() {
            if(!selectedRoomId) return;
            const inp = document.getElementById('admin-msg-input');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';
            
            await db.collection("messages").add({
                message_text: val,
                sender: 'admin',
                receiver: selectedRoomId,
                room_id: selectedRoomId,
                time_now: Date.now(),
                type: 'text',
                status: 'sent'
            });
        }
        document.getElementById('admin-send-btn').addEventListener('click', sendAdminMessage);
        document.getElementById('admin-msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAdminMessage(); });
    </script>
</body>
</html>
